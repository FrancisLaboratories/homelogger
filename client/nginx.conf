server {
    listen 3005;
    client_max_body_size 100M;

    # Use Docker's embedded DNS to resolve service names at runtime.
    # The resolver directive + proxy_pass with a variable forces nginx
    # to resolve the `server` hostname via Docker DNS (127.0.0.11).
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        set $upstream_server "server:8083";
        proxy_pass http://$upstream_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health { # health check endpoint
        return 200 'OK';
        add_header Content-Type text/plain;

    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}