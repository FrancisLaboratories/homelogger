services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    volumes:
      - data:/root/data
    environment:
      - DB_DIALECT=sqlite
      # - LOG_CONSOLE=true
      # - LOG_FILE=/root/data/homelogger.log
    networks:
      - homeloggerNetwork
    restart: unless-stopped

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3005:80"
    volumes:
      - ../client/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
    networks:
      - homeloggerNetwork
    restart: unless-stopped

volumes:
  data:

networks:
  homeloggerNetwork:
    driver: bridge
